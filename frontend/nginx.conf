# D-06: single server block on :80.
# Static files from /usr/share/nginx/html (Vite build output).
# /api/* proxied to the backend service with the /api prefix stripped,
# mirroring Vite dev proxy rewrite (path.replace(/^\/api/, '')).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — any unknown path resolves to index.html so React Router
    # (if added later) works, and direct refreshes on client-side routes
    # don't 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # D-06: /api/query -> http://backend:8000/query (prefix strip happens
    # because proxy_pass URI ends with "/"; nginx replaces the matched
    # location prefix with the proxy_pass URI path).
    # `backend` resolves on the default Docker Compose network (service name).
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Phase 2 POST /query can take ~2s under load (LLM + Chroma).
        # Default nginx proxy_read_timeout is 60s which is fine, but we set
        # it explicitly so an operator reading the config knows the budget.
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
